<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterclass Footprint - Live API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000000; 
            color: #ffffff;
            font-family: 'Consolas', 'Courier New', monospace; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 16px;
            display: flex;
            gap: 20px;
            font-size: 13px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            background: rgba(0,0,0,0.8);
            border-bottom: 1px solid #1a1a1a;
        }

        .hud-item { display: flex; gap: 6px; }
        .hud-label { color: #666666; }
        .hud-val { color: #dddddd; }
        .hud-val.red { color: #ff3333; }
        .hud-val.green { color: #33ff33; }
    </style>
</head>
<body>
    <div id="hud">
        <div class="hud-item"><span class="hud-label">O:</span><span class="hud-val" id="hud-o">0.00</span></div>
        <div class="hud-item"><span class="hud-label">H:</span><span class="hud-val" id="hud-h">0.00</span></div>
        <div class="hud-item"><span class="hud-label">L:</span><span class="hud-val" id="hud-l">0.00</span></div>
        <div class="hud-item"><span class="hud-label">C:</span><span class="hud-val" id="hud-c">0.00</span></div>
        <div class="hud-item"><span class="hud-label">Δ:</span><span class="hud-val" id="hud-delta">0</span></div>
        <div class="hud-item"><span class="hud-label">%Δ:</span><span class="hud-val" id="hud-pdelta">0.00%</span></div>
        <div class="hud-item"><span class="hud-label">V:</span><span class="hud-val" id="hud-v">0</span></div>
    </div>
    
    <canvas id="chart"></canvas>

    <script>
        // Set tickSize to 10 for BTC to compress vertical height
        const tickSize = 10;
        const candleTimeframeMs = 60 * 1000; 
        
        const rowHeight = 16;
        const colWidth = 60;
        const gap = 8;
        const xAxisHeight = 30;

        let data = [];
        let isInitialized = false;

        const ws = new WebSocket('wss://ws.okx.com:8443/ws/v5/public');
        
        ws.onopen = () => {
            ws.send(JSON.stringify({
                "op": "subscribe",
                "args": [{"channel": "trades", "instId": "BTC-USDT-SWAP"}]
            }));
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (!msg.data) return;

            msg.data.forEach(trade => {
                let px = parseFloat(trade.px);
                let sz = parseInt(trade.sz); 
                let side = trade.side; 
                let ts = parseInt(trade.ts);

                if (!isInitialized) {
                    isInitialized = true;
                    resize(); 
                }

                let candleTime = Math.floor(ts / candleTimeframeMs) * candleTimeframeMs;
                let lastCandle = data.length > 0 ? data[data.length - 1] : null;

                // Create new candle if time rolled over or first trade
                if (!lastCandle || lastCandle.time !== candleTime) {
                    lastCandle = {
                        time: candleTime,
                        open: px, high: px, low: px, close: px,
                        footprint: {}, candleVol: 0, candleDelta: 0
                    };
                    data.push(lastCandle);
                    if (data.length > 100) data.shift();
                }

                // Update OHLC
                if (px > lastCandle.high) lastCandle.high = px;
                if (px < lastCandle.low) lastCandle.low = px;
                lastCandle.close = px;

                // Group price ticks
                let roundedPrice = Math.round(px / tickSize) * tickSize;
                let pStr = roundedPrice.toFixed(1);

                if (!lastCandle.footprint[pStr]) {
                    lastCandle.footprint[pStr] = { bid: 0, ask: 0 };
                }

                // Update footprint volume
                if (side === 'buy') {
                    lastCandle.footprint[pStr].ask += sz;
                    lastCandle.candleDelta += sz;
                } else if (side === 'sell') {
                    lastCandle.footprint[pStr].bid += sz;
                    lastCandle.candleDelta -= sz;
                }
                
                lastCandle.candleVol += sz;
            });
            
            // Auto-scroll mechanics
            let rightOffset = (data.length - 1) * (colWidth + gap);
            let targetPanX = width - rightOffset - colWidth - 60;
            if (!isDragging && panX > targetPanX - 100) {
                panX = targetPanX;
            }

            requestAnimationFrame(draw);
        };

        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d', { alpha: false }); 

        let width, height;
        let panX = 100;
        let panY = 0;
        let startPanYOffset = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            
            if (startPanYOffset === 0 && data.length > 0) {
                 startPanYOffset = 1;
                 let globalMaxPrice = Math.max(...data.map(d => d.high));
                 let lastP = data[data.length-1].close;
                 let yWithoutPan = (globalMaxPrice - lastP) / tickSize * rowHeight;
                 panY = (height / 2) - yWithoutPan;
            }
            if (isInitialized) draw();
        }

        window.addEventListener('resize', resize);

        let isDragging = false;
        let startDragX = 0, startDragY = 0;
        let mouseX = -1, mouseY = -1;

        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            startDragX = e.clientX - panX;
            startDragY = e.clientY - panY;
        });
        window.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (isDragging) {
                panX = e.clientX - startDragX;
                panY = e.clientY - startDragY;
            }
            requestAnimationFrame(draw);
        });
        canvas.addEventListener('wheel', e => {
            panY -= e.deltaY;
            panX -= e.deltaX;
            requestAnimationFrame(draw);
        });

        function updateHUD(candle) {
            if (!candle) return;
            
            const o = document.getElementById('hud-o');
            const h = document.getElementById('hud-h');
            const l = document.getElementById('hud-l');
            const c = document.getElementById('hud-c');
            const delta = document.getElementById('hud-delta');
            const pdelta = document.getElementById('hud-pdelta');
            const v = document.getElementById('hud-v');

            o.textContent = candle.open.toFixed(2);
            h.textContent = candle.high.toFixed(2);
            l.textContent = candle.low.toFixed(2);
            c.textContent = candle.close.toFixed(2);
            
            o.className = 'hud-val';
            h.className = 'hud-val';
            l.className = 'hud-val';
            
            let closeColor = candle.close >= candle.open ? 'green' : 'red';
            c.className = 'hud-val ' + closeColor;

            delta.textContent = candle.candleDelta;
            delta.className = 'hud-val ' + (candle.candleDelta > 0 ? 'green' : (candle.candleDelta < 0 ? 'red' : ''));

            let pct = ((candle.close - candle.open) / candle.open * 100).toFixed(2) + '%';
            pdelta.textContent = (candle.close >= candle.open ? '+' : '') + pct;
            pdelta.className = 'hud-val ' + closeColor;

            v.textContent = candle.candleVol.toLocaleString();
        }

        function formatTime(ms) {
            let d = new Date(ms);
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }

        function draw() {
            if (!isInitialized) {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = '#888888';
                ctx.font = '14px Consolas, monospace';
                ctx.textAlign = 'center';
                ctx.fillText("Waiting for live trades from OKX...", width / 2, height / 2);
                return;
            }
            
            // Void-State Background
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);
            
            let globalMaxPrice = Math.max(...data.map(d => d.high));
            function priceToY(p) { return Math.round((globalMaxPrice - p) / tickSize * rowHeight + panY + 100); }

            // Minimalist Reference Planes (Z-Axis Layering)
            const refPrice = globalMaxPrice - 20; 
            const lines = [
                { yOffset: -50 * tickSize, color: 'rgba(0, 255, 255, 0.4)', dash: [4, 4] },
                { yOffset: -30 * tickSize, color: 'rgba(255, 0, 255, 0.4)', dash: [4, 4] },
                { yOffset: 10 * tickSize, color: 'rgba(0, 200, 0, 0.4)', dash: [4, 4] },  
                { yOffset: 40 * tickSize, color: 'rgba(255, 0, 0, 0.5)', dash: [] }       
            ];

            lines.forEach(l => {
                let y = priceToY(refPrice + l.yOffset) + 0.5; 
                ctx.beginPath();
                ctx.setLineDash(l.dash);
                ctx.strokeStyle = l.color;
                ctx.lineWidth = 1;
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            });
            ctx.setLineDash([]); 

            // Monospace Matrix
            ctx.font = 'bold 11px Consolas, "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            let hoveredCandle = null;

            for (let i = 0; i < data.length; i++) {
                let d = data[i];
                let x = Math.round(i * (colWidth + gap) + panX);
                
                if (x + colWidth < 0 || x > width) continue;

                let isHovered = mouseX >= x && mouseX <= x + colWidth;
                if (isHovered) hoveredCandle = d;

                let maxLevelVol = 0;
                let pocPrice = null;
                for (let p in d.footprint) {
                    let f = d.footprint[p];
                    if (f.bid + f.ask > maxLevelVol) {
                        maxLevelVol = f.bid + f.ask;
                        pocPrice = p;
                    }
                }
                
                // Draw footprint cells
                for (let p in d.footprint) {
                    let priceVal = parseFloat(p);
                    let f = d.footprint[p];
                    
                    if (f.bid === 0 && f.ask === 0) continue;

                    let y = priceToY(priceVal);
                    if (y + rowHeight < 0 || y > height - xAxisHeight) continue;

                    let bidStr = f.bid.toString();
                    let askStr = f.ask.toString();
                    
                    let centerX = Math.round(x + colWidth / 2);
                    let centerY = Math.round(y + rowHeight / 2);

                    let bidRatio = f.ask > 0 ? f.bid / f.ask : (f.bid > 5 ? 10 : 0);
                    let askRatio = f.bid > 0 ? f.ask / f.bid : (f.ask > 5 ? 10 : 0);
                    
                    let bidBg = bidRatio >= 2.5 && f.bid >= 5;
                    let askBg = askRatio >= 2.5 && f.ask >= 5;
                    
                    let bidColor = bidBg ? '#ffffff' : (f.bid > 0 ? '#cccccc' : '#555555');
                    let askColor = askBg ? '#ffffff' : (f.ask > 0 ? '#cccccc' : '#555555');
                    
                    let xOffset = 16;

                    // Imbalance Solid Fills (Exactly like the image)
                    if (bidBg) {
                        ctx.fillStyle = '#cc0000';
                        ctx.fillRect(centerX - xOffset - 12, y + 1, 22, rowHeight - 2);
                    } 
                    if (askBg) {
                        ctx.fillStyle = '#00aa00';
                        ctx.fillRect(centerX + xOffset - 10, y + 1, 22, rowHeight - 2);
                    } 

                    // Text Array
                    ctx.fillStyle = bidColor;
                    ctx.fillText(bidStr, centerX - xOffset, centerY);
                    
                    ctx.fillStyle = '#777777';
                    ctx.fillText('x', centerX, centerY);
                    
                    ctx.fillStyle = askColor;
                    ctx.fillText(askStr, centerX + xOffset, centerY);

                    // Optional: If the user specifically wanted border boxes for extreme imbalances
                    if (bidRatio >= 4 && f.bid >= 10) {
                        ctx.strokeStyle = '#cc0000';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(centerX - xOffset - 14, Math.round(y), xOffset * 2 + 28, rowHeight);
                    } else if (askRatio >= 4 && f.ask >= 10) {
                        ctx.strokeStyle = '#00aa00';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(centerX - xOffset - 14, Math.round(y), xOffset * 2 + 28, rowHeight);
                    }

                    // Master POC Outline (Amber/Gold to distinguish)
                    if (p === pocPrice) {
                        ctx.strokeStyle = '#ffaa00';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(centerX - xOffset - 14, Math.round(y), xOffset * 2 + 28, rowHeight);
                    }
                }
                
                // Bottom Time Anchor
                ctx.fillStyle = '#555555';
                ctx.fillText(formatTime(d.time), Math.round(x + colWidth / 2), height - 15);
            }

            // Update HUD
            updateHUD(hoveredCandle || data[data.length - 1]);
        }
    </script>
</body>
</html>
